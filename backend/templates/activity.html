<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Journal d'activité - Restor-PC RescueGrid</title>
  <link rel="stylesheet" href="/static/premium.css">
</head>
<body>
  <a href="/">← Dashboard</a>
  <h1>Journal d'activité</h1>
  <table>
    <thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Détail</th></tr></thead>
    <tbody>
      {% for log in logs %}
      <tr>
        <td>{{ log.created_at.strftime('%d/%m/%Y %H:%M') }}</td>
        <td>{{ log.username or '-' }}</td>
        <td>{{ log.action }}</td>
        <td>{{ log.detail or '' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
