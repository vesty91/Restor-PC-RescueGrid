<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Journal d'activité - Restor-PC RescueGrid</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 24px 40px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 18px; overflow: hidden; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
    th { background: #f8fafc; color: #667085; font-size: 12px; text-transform: uppercase; }
    h1 { color: #0f766e; }
  </style>
</head>
<body>
  <a href="/">← Dashboard</a>
  <h1>Journal d'activité</h1>
  <table>
    <thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Détail</th></tr></thead>
    <tbody>
      {% for log in logs %}
      <tr>
        <td>{{ log.created_at.strftime('%d/%m/%Y %H:%M') }}</td>
        <td>{{ log.username or '-' }}</td>
        <td>{{ log.action }}</td>
        <td>{{ log.detail or '' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
