<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion - Restor-PC RescueGrid</title>
  <style>
    :root { --brand: #0f766e; --ink: #172033; --muted: #667085; --line: #e5e7eb; --bg: #f5f7fb; }
    body { margin: 0; font-family: Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--ink); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border: 1px solid var(--line); border-radius: 18px; padding: 28px; width: min(360px, 92vw); box-shadow: 0 12px 32px rgba(23,32,51,.08); }
    h1 { margin: 0 0 6px; font-size: 22px; color: var(--brand); }
    p { margin: 0 0 18px; color: var(--muted); font-size: 13px; }
    label { display: block; margin-top: 12px; font-weight: 650; font-size: 13px; }
    input { width: 100%; box-sizing: border-box; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; font: inherit; }
    button { margin-top: 18px; width: 100%; border: 0; background: var(--brand); color: white; font-weight: 800; padding: 11px; border-radius: 12px; cursor: pointer; }
    .error { background: #fee2e2; color: #991b1b; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 13px; }
    .hint { margin-top: 14px; font-size: 12px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Restor-PC RescueGrid</h1>
    <p>Acces technicien / administrateur</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label>Identifiant</label>
      <input name="username" required autofocus>
      <label>Mot de passe</label>
      <input name="password" type="password" required>
      <button>Se connecter</button>
    </form>
    <p class="hint">Par defaut : admin / rescuegrid2026</p>
  </main>
</body>
</html>
